# Domain → owning entity, category, and country. CURATED SEED (like oui.csv).
#
# `suffix` matches a domain when it equals the domain or is a dot-suffix of it;
# the LONGEST matching suffix wins, so specific hostnames override base-domain
# fallbacks. `category` ∈ first_party | functional | cdn | telemetry | analytics
# | advertising. A destination is a tracker when category ∈ {advertising,
# analytics, telemetry} or it appears in trackers.txt.
#
# `country` is the entity's hosting/HQ country (ISO-3166 alpha-2), used for the
# scorecard's country-spread input and the M4 globe — see DECISIONS.md D-011
# (country comes from this map, NOT bundled GeoIP). Values here cover the dev
# fixture's 75 domains (D-009) plus common bases; drop in a fuller map to extend.

